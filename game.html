<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZeBongo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Black+Ops+One&display=swap" rel="stylesheet">
<style>

:root {
  --skin-bg:            #0a0a0f;
  --skin-bg-panel:      #111118;
  --skin-bg-overlay:    rgba(10, 10, 20, 0.92);
  --skin-border:        rgba(255,255,255,0.08);
  --skin-border-bright: rgba(255,255,255,0.18);

  --skin-text:          #e8e8f0;
  --skin-text-dim:      rgba(232,232,240,0.4);
  --skin-text-faint:    rgba(232,232,240,0.15);

  --skin-accent:        #FFE566;
  --skin-accent-glow:   rgba(255,229,102,0.3);

  --skin-lane-0:        #FF4D6D;
  --skin-lane-1:        #FFB347;
  --skin-lane-2:        #4DC4FF;
  --skin-lane-3:        #B47DFF;

  --skin-font-display:  'Black Ops One', cursive;
  --skin-font-mono:     'Share Tech Mono', 'Courier New', monospace;

  --skin-hud-height:    64px;
  --skin-hud-bottom:    88px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--skin-bg);
  color: var(--skin-text);
  font-family: var(--skin-font-mono);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  touch-action: none;
}

/* ─── Body-level animated background so empty desktop sides aren't dead ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 10% 40%, rgba(255,77,109,0.08), transparent 40%),
    radial-gradient(ellipse at 90% 60%, rgba(180,125,255,0.08), transparent 40%),
    radial-gradient(ellipse at 50% 100%, rgba(77,196,255,0.05), transparent 50%);
}
body.beat-pulse::before { animation: bodyPulse 0.25s ease-out; }
@keyframes bodyPulse {
  0%   { filter: brightness(1.4) saturate(1.3); }
  100% { filter: brightness(1)   saturate(1);   }
}

#app {
  display: flex; flex-direction: column; height: 100vh;
  max-width: 560px; margin: 0 auto; position: relative; z-index: 1;
}

/* ─── Side panels (desktop only) ──────────────────────────── */
.side-panel {
  position: fixed; top: 0; bottom: 0; width: calc((100vw - 560px) / 2);
  display: none; flex-direction: column; justify-content: center;
  align-items: center; padding: 32px 20px; pointer-events: none; z-index: 1;
  gap: 22px;
}
@media (min-width: 900px) { .side-panel { display: flex; } }
#side-left  { left: 0; }
#side-right { right: 0; }

.side-combo-wrap {
  display: flex; flex-direction: column; align-items: center;
  transition: transform .15s ease;
}
.side-combo-wrap.pulse { transform: scale(1.08); }
.side-combo-big {
  font-family: var(--skin-font-display); font-size: 96px; line-height: 1;
  color: var(--skin-accent);
  text-shadow: 0 0 30px var(--skin-accent-glow), 0 0 60px var(--skin-accent-glow);
  transition: color .15s, text-shadow .15s;
}
.side-combo-big.dim { color: var(--skin-text-faint); text-shadow: none; }
.side-combo-lbl {
  font-size: 11px; letter-spacing: 5px; color: var(--skin-text-dim);
  text-transform: uppercase; margin-top: 4px;
}
.side-judgment-last {
  font-family: var(--skin-font-display); font-size: 24px;
  letter-spacing: 3px; min-height: 28px;
  transition: opacity .4s;
}
.side-judgment-last.fade { opacity: 0; }

.side-stripes {
  position: absolute; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(to bottom,
    var(--skin-lane-0), var(--skin-lane-1),
    var(--skin-lane-2), var(--skin-lane-3));
  opacity: 0.2;
}
#side-left .side-stripes  { right: 0; }
#side-right .side-stripes { left: 0; }

.side-hit-bars {
  display: flex; flex-direction: column; gap: 8px; width: 110px;
}
.hit-bar-row {
  display: grid; grid-template-columns: 60px 1fr 30px;
  gap: 6px; align-items: center;
  font-size: 10px; letter-spacing: 2px; color: var(--skin-text-dim);
}
.hit-bar-row .lbl { text-transform: uppercase; }
.hit-bar-row .bar {
  height: 4px; background: rgba(255,255,255,0.06); overflow: hidden;
}
.hit-bar-row .bar > span { display: block; height: 100%; width: 0;
  transition: width .15s ease; }
.hit-bar-row .count { font-family: var(--skin-font-display); text-align: right; color: var(--skin-text); }
.hit-bar-row.perfect .bar > span { background: var(--skin-accent); }
.hit-bar-row.great   .bar > span { background: var(--skin-lane-2); }
.hit-bar-row.good    .bar > span { background: #88FF99; }
.hit-bar-row.bad     .bar > span { background: #FF9955; }
.hit-bar-row.miss    .bar > span { background: #FF4455; }

/* ─── Top HUD ──────────────────────────────────────────── */
#hud-top {
  height: var(--skin-hud-height);
  background: var(--skin-bg-panel);
  border-bottom: 1px solid var(--skin-border);
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 0 16px; gap: 8px;
  position: relative; z-index: 10; flex-shrink: 0;
}
#combo-display { display: flex; flex-direction: column; align-items: flex-start; }
#combo-num {
  font-family: var(--skin-font-display); font-size: 28px;
  line-height: 1; color: var(--skin-text); transition: color 0.1s;
}
#combo-label { font-size: 9px; letter-spacing: 3px; color: var(--skin-text-dim); text-transform: uppercase; }

#song-info { display: flex; flex-direction: column; align-items: center; gap: 2px; }
#song-title {
  font-family: var(--skin-font-display); font-size: 13px; letter-spacing: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
}
#song-artist { font-size: 9px; color: var(--skin-text-dim); letter-spacing: 2px; text-transform: uppercase; }

#score-display { display: flex; flex-direction: column; align-items: flex-end; }
#score-num { font-family: var(--skin-font-display); font-size: 22px; line-height: 1; color: var(--skin-accent); }
#accuracy-num { font-size: 10px; color: var(--skin-text-dim); letter-spacing: 1px; }

/* ─── HP bar (under top HUD) ───────────────────────────── */
#hp-bar {
  height: 6px; background: rgba(255,255,255,0.04);
  position: relative; overflow: hidden; flex-shrink: 0; z-index: 10;
  border-bottom: 1px solid var(--skin-border);
}
#hp-bar-fill {
  height: 100%; width: 70%;
  background: linear-gradient(to right, #88FF99, var(--skin-accent));
  transition: width .2s ease, background .2s ease;
  box-shadow: 0 0 6px rgba(136,255,153,0.4);
}
#hp-bar-fill.hp-warn {
  background: linear-gradient(to right, #FF9955, var(--skin-accent));
  box-shadow: 0 0 6px rgba(255,153,85,0.4);
}
#hp-bar-fill.hp-danger {
  background: #FF4455;
  box-shadow: 0 0 10px rgba(255,68,85,0.6);
  animation: hpPulse 0.6s ease-in-out infinite alternate;
}
@keyframes hpPulse { to { opacity: 0.6; } }

/* ─── Game Canvas ──────────────────────────────────────── */
#game-area { flex: 1; position: relative; overflow: hidden; min-height: 0; }
#game-canvas { display: block; position: absolute; inset: 0; }

/* ─── Progress bar ──────────────────────────────────────── */
#progress-bar {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--skin-accent); width: 0;
  transition: width 0.1s linear; z-index: 5;
  box-shadow: 0 0 8px var(--skin-accent-glow);
}

/* ─── Pause button ──────────────────────────────────────── */
#btn-pause {
  position: absolute; top: 10px; right: 10px;
  padding: 6px 14px; background: rgba(17,17,24,0.8);
  border: 1px solid var(--skin-border); color: var(--skin-text-dim);
  font-family: var(--skin-font-mono); font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; opacity: 0; pointer-events: none;
  transition: opacity .2s; z-index: 10;
}
#btn-pause.visible { opacity: 1; pointer-events: all; }

/* ─── Back button ───────────────────────────────────────── */
#btn-back {
  position: absolute; top: 10px; left: 10px;
  padding: 6px 12px; background: rgba(17,17,24,0.8);
  border: 1px solid var(--skin-border); color: var(--skin-text-dim);
  font-family: var(--skin-font-mono); font-size: 10px;
  letter-spacing: 2px; cursor: pointer; z-index: 10;
}
#btn-back:hover { border-color: var(--skin-border-bright); color: var(--skin-text); }

/* ─── Touch zones ───────────────────────────────────────── */
#touch-zones {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
  display: grid; grid-template-columns: repeat(4, 1fr);
  pointer-events: none; z-index: 5;
}
.touch-zone {
  pointer-events: all; background: transparent;
  border: none; outline: none; -webkit-tap-highlight-color: transparent;
}

/* ─── Bottom HUD ────────────────────────────────────────── */
#hud-bottom {
  height: var(--skin-hud-bottom); background: var(--skin-bg-panel);
  border-top: 1px solid var(--skin-border);
  display: grid; grid-template-columns: repeat(4, 1fr);
  align-items: center; flex-shrink: 0; position: relative; z-index: 10;
}
.lane-indicator {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 0; transition: background 0.06s; cursor: pointer;
  border-right: 1px solid var(--skin-border);
}
.lane-indicator:last-child { border-right: none; }
.lane-indicator.active { background: rgba(255,255,255,0.04); }
.lane-key { font-family: var(--skin-font-display); font-size: 20px; line-height: 1; transition: color 0.06s; }
.lane-dot { width: 6px; height: 6px; border-radius: 50%; transition: opacity .06s, transform .06s; opacity: 0.4; }
.lane-indicator.active .lane-dot { opacity: 1; transform: scale(1.4); }
.lane-0 .lane-key, .lane-0.active .lane-dot { color: var(--skin-lane-0); background: var(--skin-lane-0); }
.lane-1 .lane-key, .lane-1.active .lane-dot { color: var(--skin-lane-1); background: var(--skin-lane-1); }
.lane-2 .lane-key, .lane-2.active .lane-dot { color: var(--skin-lane-2); background: var(--skin-lane-2); }
.lane-3 .lane-key, .lane-3.active .lane-dot { color: var(--skin-lane-3); background: var(--skin-lane-3); }
.lane-0 .lane-dot { background: var(--skin-lane-0); }
.lane-1 .lane-dot { background: var(--skin-lane-1); }
.lane-2 .lane-dot { background: var(--skin-lane-2); }
.lane-3 .lane-dot { background: var(--skin-lane-3); }

/* ─── Overlay (tap-to-start) ─────────────────────────────── */
#overlay {
  position: absolute; inset: 0; background: var(--skin-bg-overlay);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 18px; z-index: 20; transition: opacity 0.3s;
  cursor: pointer;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
.overlay-logo { font-family: var(--skin-font-display); font-size: 48px; letter-spacing: 4px; }
.overlay-logo span { color: var(--skin-accent); }
.overlay-tagline { font-size: 10px; letter-spacing: 4px; color: var(--skin-text-dim); text-transform: uppercase; }
.overlay-keys { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.key-chip {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--skin-border-bright); border-radius: 6px;
  font-family: var(--skin-font-display); font-size: 16px;
}
.k0 { color: var(--skin-lane-0); border-color: var(--skin-lane-0); }
.k1 { color: var(--skin-lane-1); border-color: var(--skin-lane-1); }
.k2 { color: var(--skin-lane-2); border-color: var(--skin-lane-2); }
.k3 { color: var(--skin-lane-3); border-color: var(--skin-lane-3); }

.tap-hint {
  margin-top: 12px; font-family: var(--skin-font-display);
  font-size: 13px; letter-spacing: 4px; color: var(--skin-accent);
  animation: tapHintPulse 1.2s ease-in-out infinite alternate;
}
@keyframes tapHintPulse {
  from { opacity: 0.45; transform: scale(1); }
  to   { opacity: 1;    transform: scale(1.04); }
}

/* ─── Retry fallback button (only shown on old devices) ─── */
.btn-start {
  padding: 12px 40px; background: var(--skin-accent);
  border: none; color: #0a0a0f;
  font-family: var(--skin-font-display); font-size: 16px; letter-spacing: 3px;
  cursor: pointer; transition: opacity .12s, transform .1s;
}
.btn-start:hover  { opacity: 0.87; }
.btn-start:active { transform: scale(0.97); }

/* ─── Results overlay ───────────────────────────────────── */
#results {
  position: absolute; inset: 0; background: var(--skin-bg-overlay);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 8px; z-index: 20;
  opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
#results.visible { opacity: 1; pointer-events: all; }
#results.failed { background: rgba(30, 5, 10, 0.95); }
#results.failed .results-title { color: #FF4455; text-shadow: 0 0 20px rgba(255,68,85,0.5); }
.results-title {
  font-family: var(--skin-font-display); font-size: 28px;
  letter-spacing: 4px; color: var(--skin-accent);
  text-shadow: 0 0 20px var(--skin-accent-glow);
}
.results-score { font-family: var(--skin-font-display); font-size: 40px; }
.results-accuracy { font-size: 14px; color: var(--skin-text-dim); letter-spacing: 2px; }
.results-maxcombo { font-size: 12px; color: var(--skin-text-dim); letter-spacing: 2px; }
.results-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-top: 8px; }
.results-cell { text-align: center; }
.results-cell-label { font-size: 8px; letter-spacing: 2px; color: var(--skin-text-dim); text-transform: uppercase; margin-bottom: 3px; }
.results-cell-val { font-family: var(--skin-font-display); font-size: 18px; }
.rc-perfect { color: var(--skin-accent); }
.rc-great   { color: var(--skin-lane-2); }
.rc-good    { color: #88FF99; }
.rc-bad     { color: #FF9955; }
.rc-miss    { color: #FF4455; }

/* ─── Reward banner (shown in results) ──────────────────── */
#reward-banner {
  font-size: 12px; letter-spacing: 2px; color: var(--skin-accent);
  background: rgba(255,229,102,0.08); border: 1px solid rgba(255,229,102,0.2);
  padding: 8px 20px; text-align: center; display: none;
}
#reward-banner.visible { display: block; }

/* ─── Leaderboard button ────────────────────────────────── */
.results-btns { display: flex; gap: 10px; margin-top: 8px; }
.btn-lb {
  padding: 10px 20px; background: none;
  border: 1px solid var(--skin-border-bright); color: var(--skin-text);
  font-family: var(--skin-font-display); font-size: 12px; letter-spacing: 2px;
  cursor: pointer; transition: border-color .12s;
}
.btn-lb:hover { border-color: var(--skin-accent); color: var(--skin-accent); }

/* ─── Error screen ──────────────────────────────────────── */
#error-screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; position: absolute; inset: 0; background: var(--skin-bg); z-index: 30;
  font-family: var(--skin-font-mono); color: var(--skin-text-dim); text-align: center; padding: 40px;
}
#error-screen.visible { display: flex; }
.error-icon { font-size: 48px; }

/* ─── Loading screen ────────────────────────────────────── */
#loading-screen {
  position: absolute; inset: 0; background: var(--skin-bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 30;
}
#loading-screen.hidden { display: none; }
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--skin-border);
  border-top-color: var(--skin-accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-size: 10px; letter-spacing: 3px; color: var(--skin-text-dim); text-transform: uppercase;
}

</style>
</head>
<body>

<!-- Side decor panels (desktop only; purely visual feedback) -->
<div class="side-panel" id="side-left">
  <div class="side-stripes"></div>
  <div class="side-combo-wrap" id="side-combo-wrap-left">
    <div class="side-combo-big dim" id="side-combo-left">0</div>
    <div class="side-combo-lbl">Combo</div>
  </div>
  <div class="side-judgment-last" id="side-judgment-left"></div>
</div>

<div class="side-panel" id="side-right">
  <div class="side-stripes"></div>
  <div class="side-hit-bars" id="side-hit-bars">
    <div class="hit-bar-row perfect"><span class="lbl">Perfect</span><span class="bar"><span></span></span><span class="count" id="hc-perfect">0</span></div>
    <div class="hit-bar-row great"><span class="lbl">Great</span><span class="bar"><span></span></span><span class="count" id="hc-great">0</span></div>
    <div class="hit-bar-row good"><span class="lbl">Good</span><span class="bar"><span></span></span><span class="count" id="hc-good">0</span></div>
    <div class="hit-bar-row bad"><span class="lbl">Bad</span><span class="bar"><span></span></span><span class="count" id="hc-bad">0</span></div>
    <div class="hit-bar-row miss"><span class="lbl">Miss</span><span class="bar"><span></span></span><span class="count" id="hc-miss">0</span></div>
  </div>
</div>

<div id="app">
  <!-- Loading screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-label">Loading Chart…</div>
  </div>

  <!-- Error screen -->
  <div id="error-screen">
    <div class="error-icon">⚠</div>
    <div id="error-msg">Level not found.</div>
    <button class="btn-start" onclick="window.location.href='menu.html'">Back to Menu</button>
  </div>

  <!-- Top HUD -->
  <div id="hud-top">
    <div id="combo-display">
      <div id="combo-num">0</div>
      <div id="combo-label">Combo</div>
    </div>
    <div id="song-info">
      <div id="song-title">—</div>
      <div id="song-artist">—</div>
    </div>
    <div id="score-display">
      <div id="score-num">000000</div>
      <div id="accuracy-num">100.00%</div>
    </div>
  </div>

  <!-- HP bar -->
  <div id="hp-bar"><div id="hp-bar-fill"></div></div>

  <!-- Game area -->
  <div id="game-area">
    <canvas id="game-canvas"></canvas>

    <div id="touch-zones">
      <div class="touch-zone" id="tz0"></div>
      <div class="touch-zone" id="tz1"></div>
      <div class="touch-zone" id="tz2"></div>
      <div class="touch-zone" id="tz3"></div>
    </div>

    <div id="progress-bar"></div>
    <button id="btn-back"  onclick="window.location.href='menu.html'">← Menu</button>
    <button id="btn-pause">PAUSE</button>

    <!-- Start overlay — the whole overlay is the tap target -->
    <div id="overlay">
      <div class="overlay-logo">Ze<span>Bongo</span></div>
      <div class="overlay-tagline" id="overlay-song">Loading…</div>
      <div class="overlay-keys">
        <div class="key-chip k0">D</div>
        <div class="key-chip k1">F</div>
        <div class="key-chip k2">J</div>
        <div class="key-chip k3">K</div>
      </div>
      <div class="tap-hint" id="tap-hint">TAP OR PRESS ANY KEY</div>
      <div id="overlay-mode-info" style="font-size:10px;letter-spacing:2px;color:rgba(232,232,240,0.4);margin-top:8px"></div>
    </div>

    <!-- Results overlay -->
    <div id="results">
      <div class="results-title" id="results-title">STAGE CLEAR</div>
      <div class="results-score" id="res-score">000000</div>
      <div class="results-accuracy" id="res-accuracy">ACC 100.00%</div>
      <div class="results-maxcombo" id="res-maxcombo">MAX COMBO 0</div>
      <div class="results-grid">
        <div class="results-cell">
          <div class="results-cell-label">Perfect</div>
          <div class="results-cell-val rc-perfect" id="rc-perfect">0</div>
        </div>
        <div class="results-cell">
          <div class="results-cell-label">Great</div>
          <div class="results-cell-val rc-great" id="rc-great">0</div>
        </div>
        <div class="results-cell">
          <div class="results-cell-label">Good</div>
          <div class="results-cell-val rc-good" id="rc-good">0</div>
        </div>
        <div class="results-cell">
          <div class="results-cell-label">Bad</div>
          <div class="results-cell-val rc-bad" id="rc-bad">0</div>
        </div>
        <div class="results-cell">
          <div class="results-cell-label">Miss</div>
          <div class="results-cell-val rc-miss" id="rc-miss">0</div>
        </div>
      </div>
      <div id="reward-banner"></div>
      <div class="results-btns">
        <button class="btn-start" id="btn-retry" style="margin-top:0">Retry</button>
        <button class="btn-lb" id="btn-leaderboard">Leaderboard</button>
        <button class="btn-lb" onclick="window.location.href='menu.html'">Menu</button>
      </div>
    </div>

  </div><!-- /game-area -->

  <!-- Bottom HUD -->
  <div id="hud-bottom">
    <div class="lane-indicator lane-0" id="li0"><div class="lane-key">D</div><div class="lane-dot"></div></div>
    <div class="lane-indicator lane-1" id="li1"><div class="lane-key">F</div><div class="lane-dot"></div></div>
    <div class="lane-indicator lane-2" id="li2"><div class="lane-key">J</div><div class="lane-dot"></div></div>
    <div class="lane-indicator lane-3" id="li3"><div class="lane-key">K</div><div class="lane-dot"></div></div>
  </div>
</div>

<script type="module">
import { AudioEngine }   from './js/audio.js';
import { InputHandler }  from './js/input.js';
import { Engine }        from './js/engine.js';
import { Chart }         from './js/chart.js';
import { requireAuth }   from './js/auth.js';
import { getLevel, submitScore, getLeaderboard, getPlayerRankOnLevel, tsToDate, getPlayer } from './js/firebase.js';

// ─── Auth guard ──────────────────────────────────────────────────────
let currentUser;
try { currentUser = await requireAuth(); } catch (_) { /* redirects */ }

// ─── DOM ─────────────────────────────────────────────────────────────
const canvas      = document.getElementById('game-canvas');
const overlay     = document.getElementById('overlay');
const resultsEl   = document.getElementById('results');
const btnRetry    = document.getElementById('btn-retry');
const btnPause    = document.getElementById('btn-pause');
const btnLB       = document.getElementById('btn-leaderboard');
const comboNum    = document.getElementById('combo-num');
const scoreNum    = document.getElementById('score-num');
const accuracyNum = document.getElementById('accuracy-num');
const songTitle   = document.getElementById('song-title');
const songArtist  = document.getElementById('song-artist');
const progressBar = document.getElementById('progress-bar');
const laneInds    = [0,1,2,3].map(i => document.getElementById('li'+i));
const touchZones  = [0,1,2,3].map(i => document.getElementById('tz'+i));
const loadingScr  = document.getElementById('loading-screen');
const errorScr    = document.getElementById('error-screen');
const errorMsg    = document.getElementById('error-msg');
const rewardBnr   = document.getElementById('reward-banner');
const overlaySong = document.getElementById('overlay-song');
const hpFill      = document.getElementById('hp-bar-fill');
const sideComboEl = document.getElementById('side-combo-left');
const sideComboWrap = document.getElementById('side-combo-wrap-left');
const sideJudge   = document.getElementById('side-judgment-left');
const hitBarCells = {
  PERFECT: document.getElementById('hc-perfect'),
  GREAT:   document.getElementById('hc-great'),
  GOOD:    document.getElementById('hc-good'),
  BAD:     document.getElementById('hc-bad'),
  MISS:    document.getElementById('hc-miss'),
};
const hitBarFills = {
  PERFECT: document.querySelector('.hit-bar-row.perfect .bar > span'),
  GREAT:   document.querySelector('.hit-bar-row.great   .bar > span'),
  GOOD:    document.querySelector('.hit-bar-row.good    .bar > span'),
  BAD:     document.querySelector('.hit-bar-row.bad     .bar > span'),
  MISS:    document.querySelector('.hit-bar-row.miss    .bar > span'),
};

// ─── State ───────────────────────────────────────────────────────────
const levelId = new URLSearchParams(window.location.search).get('levelId');
const audio   = new AudioEngine();
const input   = new InputHandler(audio);
const engine  = new Engine(canvas, audio, input);

let chart     = null;
let levelData = null;
let animProgress;
let paused    = false;

// ─── Load chart ──────────────────────────────────────────────────────
async function loadChartFromFirestore() {
  if (!levelId) {
    showError('No level specified. Go back and pick a map.');
    return false;
  }
  try {
    levelData = await getLevel(levelId);
    if (!levelData) { showError('Level not found.'); return false; }
    chart = new Chart(levelData);

    // Apply player's equipped note skin — done BEFORE loadChart so the
    // first render uses the right colors. If fetch fails for any reason
    // (offline, rule change), the engine silently keeps its defaults.
    try {
      const me = await getPlayer(currentUser.uid);
      if (me?.noteSkinsId) engine.setNoteSkin(me.noteSkinsId);
    } catch (_) {}

    engine.loadChart(chart);

    // Apply note speed and HP mode from chart metadata
    engine.setNoteSpeed(chart.noteSpeed);
    engine.setHpMode(chart.hpMode);

    songTitle.textContent  = chart.title;
    songArtist.textContent = chart.artist;
    overlaySong.textContent = `${chart.title} · ${chart.artist}`;
    document.title = `ZeBongo — ${chart.title}`;

    // Show speed/HP info in the pre-game overlay
    const modeInfo = document.getElementById('overlay-mode-info');
    if (modeInfo) {
      const speedStr = chart.noteSpeed !== 1.0 ? `▶ ${chart.noteSpeed}×` : '';
      const hpStr    = chart.hpMode    !== 'Normal' ? `HP: ${chart.hpMode}` : '';
      modeInfo.textContent = [speedStr, hpStr].filter(Boolean).join('  ·  ');
    }

    loadingScr.classList.add('hidden');
    return true;
  } catch (e) {
    showError('Failed to load chart: ' + e.message);
    return false;
  }
}

function showError(msg) {
  loadingScr.classList.add('hidden');
  errorMsg.textContent = msg;
  errorScr.classList.add('visible');
}

// ─── Engine callbacks ────────────────────────────────────────────────
engine.onScore = (score) => {
  scoreNum.textContent = String(score).padStart(6, '0');
  const acc = engine.totalHits === 0 ? 100
    : (engine.totalWeightedAccuracy / chart.totalNotes * 100);
  accuracyNum.textContent = Math.min(100, acc).toFixed(2) + '%';
};

const JUDGE_COLORS = {
  PERFECT: 'var(--skin-accent)',
  GREAT:   'var(--skin-lane-2)',
  GOOD:    '#88FF99',
  BAD:     '#FF9955',
  MISS:    '#FF4455',
};

engine.onCombo = (combo, judgment) => {
  // Top HUD combo number
  comboNum.textContent = combo;
  comboNum.style.color = judgment ? JUDGE_COLORS[judgment.name] : 'var(--skin-text)';
  if (judgment?.name === 'MISS' || combo === 0) {
    comboNum.style.color = '#FF4455';
    comboNum.textContent = '×';
    setTimeout(() => {
      comboNum.textContent = '0';
      comboNum.style.color = 'var(--skin-text)';
    }, 250);
  }

  // Big side combo on desktop
  if (combo === 0) {
    sideComboEl.textContent = '0';
    sideComboEl.classList.add('dim');
  } else {
    sideComboEl.textContent = combo;
    sideComboEl.classList.remove('dim');
    sideComboEl.style.color = judgment ? JUDGE_COLORS[judgment.name] : '';
    sideComboWrap.classList.remove('pulse');
    // Force reflow so the class re-triggers its transition
    void sideComboWrap.offsetWidth;
    sideComboWrap.classList.add('pulse');
    setTimeout(() => sideComboWrap.classList.remove('pulse'), 150);
  }

  // Body flash — uses the pseudo-element gradient for a cheap "beat pulse"
  if (combo > 0 && combo % 10 === 0 && judgment?.name !== 'MISS') {
    document.body.classList.remove('beat-pulse');
    void document.body.offsetWidth;
    document.body.classList.add('beat-pulse');
  }
};

// Show the last judgment text on the left side panel too
engine.onJudgment = (judgment) => {
  if (!judgment) return;
  sideJudge.textContent = judgment.name;
  sideJudge.style.color = JUDGE_COLORS[judgment.name];
  sideJudge.classList.remove('fade');
  clearTimeout(engine.onJudgment._t);
  engine.onJudgment._t = setTimeout(() => sideJudge.classList.add('fade'), 500);

  // Tally bar fills (normalized to total notes seen so far)
  const counts = engine.counts;
  const totalTallies = counts.PERFECT + counts.GREAT + counts.GOOD + counts.BAD + counts.MISS || 1;
  for (const name of Object.keys(hitBarCells)) {
    hitBarCells[name].textContent = counts[name];
    const pct = counts[name] / totalTallies * 100;
    if (hitBarFills[name]) hitBarFills[name].style.width = pct + '%';
  }
};

// HP bar updates (both color and width)
engine.onHp = (hp) => {
  hpFill.style.width = hp + '%';
  hpFill.classList.toggle('hp-warn',   hp > 15 && hp <= 40);
  hpFill.classList.toggle('hp-danger', hp <= 15);
};

engine.onEnd = async (results) => {
  btnPause.classList.remove('visible');
  cancelAnimationFrame(animProgress);

  // Save to Firestore
  let rewardInfo = null;
  try {
    rewardInfo = await submitScore(currentUser.uid, levelId, results);
  } catch (e) {
    console.warn('Score submit failed:', e.message);
  }

  showResults(results, rewardInfo, /*failed*/ false);
};

engine.onFail = async (results) => {
  btnPause.classList.remove('visible');
  cancelAnimationFrame(animProgress);

  // Still submit the score so stats (plays/misses/etc.) are tracked,
  // but do NOT count this as a clear — results.accuracy is already real.
  let rewardInfo = null;
  try {
    rewardInfo = await submitScore(currentUser.uid, levelId, results);
  } catch (e) {
    console.warn('Score submit failed:', e.message);
  }

  showResults(results, rewardInfo, /*failed*/ true);
};

// ─── Lane indicators ─────────────────────────────────────────────────
input.on('press',   e => laneInds[e.lane].classList.add('active'));
input.on('release', e => laneInds[e.lane].classList.remove('active'));

// ─── Progress bar ─────────────────────────────────────────────────────
function tickProgress() {
  if (!chart) return;
  progressBar.style.width = Math.min(100, audio.getCurrentTime() / chart.durationSeconds * 100) + '%';
  animProgress = requestAnimationFrame(tickProgress);
}

// ─── Start game ───────────────────────────────────────────────────────
let gameStarted = false;   // guard against double-start
async function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  await audio.init();
  if (chart.audioUrl) {
    try { await audio.loadFromUrl(chart.audioUrl); }
    catch (e) {
      console.warn('Audio load failed, using silence:', e);
      audio.loadSilent(chart.durationSeconds + 2);
    }
  } else {
    audio.loadSilent(chart.durationSeconds + 2);
  }

  overlay.classList.add('hidden');
  resultsEl.classList.remove('visible');
  resultsEl.classList.remove('failed');
  btnPause.classList.add('visible');
  rewardBnr.classList.remove('visible');

  scoreNum.textContent    = '000000';
  comboNum.textContent    = '0';
  comboNum.style.color    = 'var(--skin-text)';
  accuracyNum.textContent = '100.00%';
  progressBar.style.width = '0%';
  sideComboEl.textContent = '0';
  sideComboEl.classList.add('dim');
  sideJudge.textContent   = '';
  for (const k of Object.keys(hitBarCells)) {
    hitBarCells[k].textContent = '0';
    if (hitBarFills[k]) hitBarFills[k].style.width = '0%';
  }

  input.attach();
  input.attachTouchZones(touchZones);
  animProgress = requestAnimationFrame(tickProgress);
  await engine.start();
}

// ─── Results ──────────────────────────────────────────────────────────
function showResults(results, reward, failed) {
  const titleEl = document.getElementById('results-title');
  const isFc = results.counts.MISS === 0 && results.counts.BAD === 0;

  if (failed) {
    titleEl.textContent = 'FAILED';
    resultsEl.classList.add('failed');
  } else {
    titleEl.textContent = isFc ? '★ FULL COMBO ★' : 'STAGE CLEAR';
    resultsEl.classList.remove('failed');
  }

  document.getElementById('res-score').textContent    = String(results.score).padStart(6, '0');
  document.getElementById('res-accuracy').textContent = 'ACC ' + Math.min(100, results.accuracy).toFixed(2) + '%';
  document.getElementById('res-maxcombo').textContent = 'MAX COMBO ' + results.maxCombo;
  document.getElementById('rc-perfect').textContent   = results.counts.PERFECT;
  document.getElementById('rc-great').textContent     = results.counts.GREAT;
  document.getElementById('rc-good').textContent      = results.counts.GOOD;
  document.getElementById('rc-bad').textContent       = results.counts.BAD;
  document.getElementById('rc-miss').textContent      = results.counts.MISS;

  if (reward && !failed) {
    const msgs = [];
    if (reward.unverified) {
      msgs.push('⚠ Unverified map — no coins earned');
    } else {
      msgs.push(`+${reward.reward} 🪙`);
      if (reward.isFirstClear)  msgs.push('First Clear Bonus!');
    }
    if (reward.isFullCombo)   msgs.push('Full Combo!');
    if (reward.isNewBest)     msgs.push('New Best Score!');
    if (reward.newAchievements?.length) {
      msgs.push(`🏅 ${reward.newAchievements.length} achievement${reward.newAchievements.length > 1 ? 's' : ''} unlocked!`);
    }
    rewardBnr.textContent = msgs.join('  ·  ');
    rewardBnr.classList.add('visible');
  }

  resultsEl.classList.add('visible');
}

// ─── Leaderboard modal ────────────────────────────────────────────────
btnLB.addEventListener('click', async () => {
  const entries = await getLeaderboard(levelId, 10);
  const myRank  = await getPlayerRankOnLevel(levelId, currentUser.uid);
  let html = `<div style="font-family:var(--skin-font-display);font-size:18px;letter-spacing:3px;margin-bottom:12px">LEADERBOARD</div>`;
  html += `<div style="font-size:10px;color:var(--skin-text-dim);letter-spacing:2px;margin-bottom:8px">${levelData.title}</div>`;
  if (!entries.length) {
    html += '<p style="color:var(--skin-text-dim);font-size:12px">No scores yet. Be the first!</p>';
  } else {
    entries.forEach(e => {
      const isMe = e.uid === currentUser.uid;
      html += `<div style="display:grid;grid-template-columns:30px 1fr 1fr;gap:8px;padding:6px 0;
        border-bottom:1px solid var(--skin-border);font-size:12px;${isMe ? 'color:var(--skin-accent)' : ''}">
        <span style="font-family:var(--skin-font-display)">${e.rank}</span>
        <span>${e.username}${isMe ? ' ◀' : ''}</span>
        <span style="text-align:right;font-family:var(--skin-font-display)">${String(e.score).padStart(6,'0')}</span>
      </div>`;
    });
    if (myRank && myRank.rank > 10) {
      html += `<div style="margin-top:8px;font-size:11px;color:var(--skin-accent)">Your rank: #${myRank.rank}</div>`;
    }
  }
  html += `<button onclick="this.closest('.lb-modal').remove()" style="margin-top:16px;padding:8px 24px;
    background:var(--skin-accent);border:none;color:#0a0a0f;font-family:var(--skin-font-display);
    font-size:12px;letter-spacing:2px;cursor:pointer;">Close</button>`;

  const modal = document.createElement('div');
  modal.className = 'lb-modal';
  modal.style.cssText = `position:fixed;inset:0;background:rgba(10,10,20,0.95);z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:left;max-width:400px;margin:auto;`;
  modal.innerHTML = html;
  document.body.appendChild(modal);
});

// ─── Pause ────────────────────────────────────────────────────────────
btnPause.addEventListener('click', () => {
  if (!paused) { engine.pause(); btnPause.textContent = 'RESUME'; cancelAnimationFrame(animProgress); }
  else         { engine.resume(); btnPause.textContent = 'PAUSE'; animProgress = requestAnimationFrame(tickProgress); }
  paused = !paused;
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && engine.state === 'playing') btnPause.click();
});

// ─── Retry ────────────────────────────────────────────────────────────
btnRetry.addEventListener('click', async () => {
  paused = false; btnPause.textContent = 'PAUSE';
  engine.restart();
  chart.reset();
  engine.loadChart(chart);
  gameStarted = false;
  await startGame();
});

// ─── Boot: auto-start on any tap/click/key while overlay is visible ───
function bootStart() {
  if (gameStarted) return;
  if (overlay.classList.contains('hidden')) return;
  startGame();
}
overlay.addEventListener('click',    bootStart);
overlay.addEventListener('touchend', (e) => { e.preventDefault(); bootStart(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  // Any key except nav/meta triggers start
  if (gameStarted) return;
  if (['Tab','Shift','Control','Alt','Meta','Escape'].includes(e.key)) return;
  bootStart();
});

const ok = await loadChartFromFirestore();
if (ok) {
  // Overlay is visible; tap or any key starts the game.
}
</script>
</body>
</html>
